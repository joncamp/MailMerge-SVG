<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     width="19.5in" height="11in" viewBox="0 0 495.3 279.4" version="1.1">
  <!-- Oval name badge, 3.5in x 2.2in. Fields: FIRSTNAME, LASTNAME -->
  <g id="nametag" inkscape:label="Nametag">
    <text x="44.45" y="26" text-anchor="middle"
          font-family="sans-serif" font-size="13" font-weight="bold"
          fill="#000000">{{FIRSTNAME}}</text>
    <text x="44.45" y="40" text-anchor="middle"
          font-family="sans-serif" font-size="8"
          fill="#000000">{{LASTNAME}}</text>
    <ellipse id="oval-cut" inkscape:label="Nametag Border"
             cx="44.45" cy="27.94" rx="44.45" ry="27.94"
             style="fill:none;stroke:#ff0000;stroke-width:0.3"/>
  </g>
</svg>
