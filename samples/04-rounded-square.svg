<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     width="19.5in" height="11in" viewBox="0 0 495.3 279.4" version="1.1">
  <!-- Rounded-square badge, 2.75in x 2.75in. Fields: NAME, PRONOUNS -->
  <g id="nametag" inkscape:label="Nametag">
    <text x="34.925" y="33" text-anchor="middle"
          font-family="sans-serif" font-size="11" font-weight="bold"
          fill="#000000">{{NAME}}</text>
    <text x="34.925" y="48" text-anchor="middle"
          font-family="sans-serif" font-size="6" font-style="italic"
          fill="#000000">{{PRONOUNS}}</text>
    <rect id="square-cut" inkscape:label="Nametag Border"
          x="0" y="0" width="69.85" height="69.85" rx="8" ry="8"
          style="fill:none;stroke:#ff0000;stroke-width:0.3"/>
  </g>
</svg>
