<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     width="19.5in" height="11in" viewBox="0 0 495.3 279.4" version="1.1">
  <!-- Classic rounded-rectangle name badge, 3.5in x 2.25in. Fields: NAME, ROLE -->
  <g id="nametag" inkscape:label="Nametag">
    <text x="44.45" y="11" text-anchor="middle"
          font-family="sans-serif" font-size="5" letter-spacing="0.6"
          fill="#000000">HELLO MY NAME IS</text>
    <line x1="6" y1="15" x2="82.9" y2="15" stroke="#000000" stroke-width="0.3"/>
    <text x="44.45" y="36" text-anchor="middle"
          font-family="sans-serif" font-size="13" font-weight="bold"
          fill="#000000">{{NAME}}</text>
    <text x="44.45" y="49" text-anchor="middle"
          font-family="sans-serif" font-size="6"
          fill="#000000">{{ROLE}}</text>
    <rect id="badge-cut" inkscape:label="Nametag Border"
          x="0" y="0" width="88.9" height="57.15" rx="4" ry="4"
          style="fill:none;stroke:#ff0000;stroke-width:0.3"/>
  </g>
</svg>
