<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     width="19.5in" height="11in" viewBox="0 0 495.3 279.4" version="1.1">
  <!-- Hexagon conference badge, ~3.4in x 3in. Fields: NAME, TITLE, COMPANY -->
  <g id="nametag" inkscape:label="Nametag">
    <text x="43.18" y="34" text-anchor="middle"
          font-family="sans-serif" font-size="11" font-weight="bold"
          fill="#000000">{{NAME}}</text>
    <text x="43.18" y="46" text-anchor="middle"
          font-family="sans-serif" font-size="6"
          fill="#000000">{{TITLE}}</text>
    <text x="43.18" y="56" text-anchor="middle"
          font-family="sans-serif" font-size="6" font-weight="bold"
          fill="#000000">{{COMPANY}}</text>
    <polygon id="hex-cut" inkscape:label="Nametag Border"
             points="21.59,0 64.77,0 86.36,38.1 64.77,76.2 21.59,76.2 0,38.1"
             style="fill:none;stroke:#ff0000;stroke-width:0.3"/>
  </g>
</svg>
